<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bf-steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a6e7a"/>
      <stop offset="0.5" stop-color="#3a3d45"/>
      <stop offset="1" stop-color="#1d1f24"/>
    </linearGradient>
    <linearGradient id="bf-ember" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb300"/>
      <stop offset="1" stop-color="#ff2d00"/>
    </linearGradient>
    <linearGradient id="bf-wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8a5a32"/>
      <stop offset="1" stop-color="#5a3a1e"/>
    </linearGradient>
  </defs>

  <!-- molten glow under the anvil -->
  <ellipse cx="30" cy="55" rx="22" ry="3.4" fill="url(#bf-ember)" opacity="0.85"/>

  <!-- anvil -->
  <g stroke="#0a0b0d" stroke-width="1.6" stroke-linejoin="round">
    <path fill="url(#bf-steel)"
          d="M6 26
             h28
             c7 0 11.5 -2.4 13.8 -6.2
             l5.2 1.6
             c-2.6 7.6 -8.4 11.4 -15.4 12.2
             l-5.6 0.4
             v5.5
             l7 5.5
             h-26
             l7 -5.5
             v-5.5
             h-5
             c-5.6 0 -9 -3.2 -9 -8 z"/>
    <!-- hardy hole -->
    <rect x="14" y="28.6" width="3.6" height="3.6" rx="0.6" fill="#111318" stroke="none"/>
  </g>

  <!-- hammer, crossing high -->
  <g transform="rotate(-36 46 16)" stroke="#0a0b0d" stroke-linejoin="round">
    <rect x="44" y="8" width="4.6" height="27" rx="1.6" fill="url(#bf-wood)" stroke-width="1.3"/>
    <rect x="37.5" y="4" width="17.5" height="9.6" rx="2" fill="url(#bf-steel)" stroke-width="1.6"/>
    <rect x="39.2" y="5.8" width="14" height="2.2" rx="1" fill="#8b8f9c" stroke="none" opacity="0.8"/>
  </g>

  <!-- sparks -->
  <circle cx="12" cy="18" r="1.9" fill="url(#bf-ember)"/>
  <circle cx="20" cy="12.5" r="1.4" fill="url(#bf-ember)"/>
  <circle cx="27" cy="17" r="1.05" fill="url(#bf-ember)"/>
  <circle cx="16.5" cy="24" r="0.9" fill="url(#bf-ember)"/>
</svg>
