name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build compendium packs
        run: npm run packs:build

      - name: Stamp version and URLs into module.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          jq --arg version "$VERSION" \
             --arg url "https://github.com/$REPO" \
             --arg manifest "https://github.com/$REPO/releases/latest/download/module.json" \
             --arg download "https://github.com/$REPO/releases/download/$TAG/module.zip" \
             '.version = $version | .url = $url | .manifest = $manifest | .download = $download' \
             module.json > module.json.tmp
          mv module.json.tmp module.json

      - name: Create archive
        run: |
          zip -r module.zip \
            module.json \
            scripts/ \
            lang/ \
            packs/ \
            styles/ \
            templates/ \
            assets/ \
            README.md CHANGELOG.md LICENSE \
            -x "packs/_source/*"

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: "module.json,module.zip"
          generateReleaseNotes: true
          allowUpdates: true
